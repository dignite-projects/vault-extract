# Release workflow. The version is read from <Version> in common.props (the single source of
# truth); a pushed v* tag must match it (guard step below), but tags do not drive the number.
#
# Routing by channel, derived from the SemVer pre-release suffix in <Version>:
#   - Pre-release (e.g. 0.2.0-preview.3) -> NuGet packages pushed to GitHub Packages only.
#   - Stable      (e.g. 0.2.0)           -> NuGet to NuGet.org, npm (@dignite/vault-extract) to npmjs.
#
# Triggers: push a v* tag (e.g. v0.2.0 or v0.2.0-preview.3) or use workflow_dispatch. For churny
# pre-release builds prefer workflow_dispatch: no tag, no draft Release, no lockstep check - just
# bump <Version> in common.props, run, and the packages land in GitHub Packages.
#
# The npm version in angular/packages/vault-extract/package.json must stay in lockstep with common.props
# <Version> (enforced by the guard step on tag pushes).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required by softprops/action-gh-release to create a draft Release
      packages: write # Required to push pre-release NuGet packages to GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Fail fast when the tag, common.props <Version>, and the npm package version disagree.
      # common.props is the truth source; CONTRIBUTING.md ("Where the version lives") requires
      # the npm version to stay in lockstep with it.
      - name: Verify tag and version lockstep
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' common.props | head -n1)
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "v$VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match <Version>$VERSION</Version> in common.props."
            exit 1
          fi
          NPM_VERSION=$(node -p "require('./angular/packages/vault-extract/package.json').version")
          if [ "$NPM_VERSION" != "$VERSION" ]; then
            echo "::error::npm version $NPM_VERSION (angular/packages/vault-extract/package.json) is not in lockstep with common.props $VERSION."
            exit 1
          fi

      # Derive the release channel from the SemVer pre-release suffix in common.props <Version>:
      # a hyphen (0.2.0-preview.3) routes packages to GitHub Packages only; a clean version
      # (0.2.0) is a stable release that goes to NuGet.org / npmjs. Runs on every trigger.
      - name: Determine release channel
        id: channel
        run: |
          VERSION=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' common.props | head -n1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "channel=preview" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION is a pre-release -> GitHub Packages only."
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION is stable -> NuGet.org / npmjs."
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Dignite.Vault.Extract.slnx

      - name: Build
        run: dotnet build Dignite.Vault.Extract.slnx --no-restore --configuration Release

      # Same backend test set as ci.yml; all are dependency-light
      # (SQLite in-memory / mocks / minimal TestServer).
      - name: Run domain tests
        run: dotnet test core/test/Dignite.Vault.Extract.Domain.Tests/Dignite.Vault.Extract.Domain.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run application tests
        run: dotnet test core/test/Dignite.Vault.Extract.Application.Tests/Dignite.Vault.Extract.Application.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run EF Core tests
        run: dotnet test core/test/Dignite.Vault.Extract.EntityFrameworkCore.Tests/Dignite.Vault.Extract.EntityFrameworkCore.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run MCP tests
        run: dotnet test core/test/Dignite.Vault.Extract.Mcp.Tests/Dignite.Vault.Extract.Mcp.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run OCR VisionLlm tests
        run: dotnet test core/test/Dignite.Vault.Extract.Ocr.VisionLlm.Tests/Dignite.Vault.Extract.Ocr.VisionLlm.Tests.csproj --no-build --configuration Release --verbosity normal

      # Projects with IsPackable=false (host / test projects; test projects are implicitly false
      # via Microsoft.NET.Test.Sdk) are skipped automatically. Only NuGet packages under core/src
      # are produced. common.props' IncludeSymbols/SymbolPackageFormat make this emit a matching
      # .snupkg next to every .nupkg.
      - name: Pack
        run: dotnet pack Dignite.Vault.Extract.slnx --no-build --configuration Release -o ./artifacts

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

      # Pre-release builds go to GitHub Packages only (private to the org, authenticated with the
      # workflow's built-in GITHUB_TOKEN). The package's <RepositoryUrl> in common.props links it
      # to dignite-projects/vault-extract, which GitHub Packages requires for the push.
      #
      # GitHub Packages does not support .snupkg symbol packages and rejects the push outright, but
      # `dotnet nuget push` auto-discovers and pushes any .snupkg co-located with the .nupkg it
      # resolves - copy the .nupkg files alone into a scratch dir with no .snupkg siblings so that
      # auto-discovery finds nothing and the push stays .nupkg-only. ./artifacts itself is untouched,
      # so the NuGet.org push and the release-asset upload below still see both file types.
      - name: Push to GitHub Packages (pre-release)
        if: steps.channel.outputs.channel == 'preview'
        run: |
          mkdir -p ./artifacts-nupkg-only
          cp ./artifacts/*.nupkg ./artifacts-nupkg-only/
          dotnet nuget push ./artifacts-nupkg-only/*.nupkg \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source https://nuget.pkg.github.com/dignite-projects/index.json \
            --skip-duplicate

      # Stable builds go to the public NuGet.org. Secrets cannot be referenced directly in if:
      # expressions, so inject through env and check in the shell; skip the push when not configured.
      # Unlike GitHub Packages, NuGet.org's symbol server accepts .snupkg: `dotnet nuget push`
      # auto-discovers each .nupkg's co-located .snupkg in ./artifacts and pushes both.
      - name: Push to NuGet.org (stable)
        if: steps.channel.outputs.channel == 'stable'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::notice::NUGET_API_KEY secret is not configured; skipping NuGet.org push (packages were uploaded as workflow artifacts)."
            exit 0
          fi
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Angular dependencies
        run: npm ci
        working-directory: angular

      - name: Build npm package
        run: npx nx build vault-extract --configuration production
        working-directory: angular

      # Pack the built library into a versioned .tgz next to the .nupkg files in ./artifacts, so a
      # single release run always emits both backend (NuGet) and frontend (npm) packages. Pre-release
      # UI libs are not published to any npm registry (see the stable-only publish step below); this
      # tarball is the artifact downstream verticals pin as a `file:` dependency.
      - name: Pack npm tarball
        run: npm pack ./dist/vault-extract --pack-destination ../artifacts
        working-directory: angular

      - name: Upload npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: artifacts/*.tgz
          if-no-files-found: error

      # npm publishes to npmjs only on stable builds. Pre-release UI builds are still compiled
      # above (validation) but not published anywhere: GitHub Packages npm would force the scope to
      # @dignite-projects/* (it must match the repo owner), colliding with the public @dignite/*
      # brand. A vertical that needs a pre-release UI lib consumes it as a pinned `npm pack` tarball.
      - name: Publish to npm (stable)
        if: steps.channel.outputs.channel == 'stable'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::notice::NPM_TOKEN secret is not configured; skipping npm publish."
            exit 0
          fi
          npm publish ./dist/vault-extract --access public
        working-directory: angular

      # Extract this version's section from CHANGELOG.md as the draft release body. The heading
      # line is dropped (the release title already carries the version). Missing section is a
      # warning, not an error: the draft is reviewed by a human who can still write the body.
      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]") > 0) found = 1; next }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::CHANGELOG.md has no section for $VERSION; the draft release body will be empty - fill it in before publishing."
          fi

      # Create a draft Release only on tag pushes (workflow_dispatch has no tag context).
      # The body is pre-filled from CHANGELOG.md; review the draft before publishing.
      - name: Create draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ steps.channel.outputs.channel == 'preview' }}
          body_path: release-notes.md
          # Attach both the NuGet packages (.nupkg) and the npm tarball (.tgz) to the draft Release.
          files: artifacts/*
