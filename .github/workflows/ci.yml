name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.github/*.png'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
      - '.claude/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.github/*.png'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
      - '.claude/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore core
        run: dotnet restore Dignite.Vault.Extract.slnx

      - name: Build core
        run: dotnet build Dignite.Vault.Extract.slnx --no-restore --configuration Release

      - name: Restore host
        run: dotnet restore host/src/Dignite.Vault.Extract.Host.csproj

      - name: Build host
        run: dotnet build host/src/Dignite.Vault.Extract.Host.csproj --no-restore --configuration Release

      - name: Run domain tests
        run: dotnet test core/test/Dignite.Vault.Extract.Domain.Tests/Dignite.Vault.Extract.Domain.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run application tests
        run: dotnet test core/test/Dignite.Vault.Extract.Application.Tests/Dignite.Vault.Extract.Application.Tests.csproj --no-build --configuration Release --verbosity normal

      # SQLite in-memory (ExtractEntityFrameworkCoreTestModule); no external database dependency.
      - name: Run EF Core tests
        run: dotnet test core/test/Dignite.Vault.Extract.EntityFrameworkCore.Tests/Dignite.Vault.Extract.EntityFrameworkCore.Tests.csproj --no-build --configuration Release --verbosity normal

      # TestBase + NSubstitute mocks (no DB / no LLM); includes MCP inputSchema regression guards
      # generated under the Autofac container, plus the #278 MCP-discovery authorization guard
      # (a minimal ASP.NET TestServer; no ABP host / DB / OpenIddict).
      - name: Run MCP tests
        run: dotnet test core/test/Dignite.Vault.Extract.Mcp.Tests/Dignite.Vault.Extract.Mcp.Tests.csproj --no-build --configuration Release --verbosity normal

      # Pure unit tests: mocked IChatClient + IPdfRasterizer; no native PDFium or external LLM dependency.
      - name: Run OCR VisionLlm tests
        run: dotnet test core/test/Dignite.Vault.Extract.Ocr.VisionLlm.Tests/Dignite.Vault.Extract.Ocr.VisionLlm.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Build Docker image
        run: docker build -f host/Dockerfile -t vault-extract-api:${{ github.sha }} .
        if: github.event_name == 'push'

  build-angular:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: angular/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: angular

      - name: Build extract library
        run: npx nx build vault-extract --configuration production
        working-directory: angular

      - name: Build host application
        run: npx nx build host --configuration production
        working-directory: angular

      - name: Lint
        run: npx nx run-many -t lint
        working-directory: angular

      # Unit tests run on plain Vitest (jsdom) via vitest.config.mts, not the
      # `@angular/build:unit-test` builder — see vitest.setup.ts for the rationale.
      - name: Unit tests
        run: npx vitest run
        working-directory: angular

      # Verifies the frontend .local image still builds (COPY paths do not regress). The nx build host
      # step above has already produced dist/host/browser; this step only packages and does not push.
      # Build context = angular/.
      - name: Build Angular Docker image
        run: docker build -f apps/host/Dockerfile.local -t vault-extract-web:${{ github.sha }} .
        working-directory: angular
        if: github.event_name == 'push'
