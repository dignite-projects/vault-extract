name: Feature request / proposal
description: Propose a change or new capability for Dignite Vault Extract.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Dignite Vault Extract is a **channel layer** with a deliberately narrow scope.
        Before proposing, please skim CLAUDE.md — especially the **OUT of scope** list
        (vectorization / retrieval / chat / RAG, business-field schemas, business modules,
        end-user LLM configuration). Those belong in downstream consumers, not this repo.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to achieve? What is the channel-layer use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What should change, and roughly where (OCR pipeline / exit contract / field architecture / document-type model / operator UI / host)?
    validations:
      required: true
  - type: dropdown
    id: boundary
    attributes:
      label: Does this touch a channel boundary?
      description: >
        OCR / text-extraction pipeline, exit contracts (REST / MCP / EventBus / Webhook, event payloads),
        the field architecture, the document-type tier system, the Markdown-first contract, or the security
        covenant. Boundary-touching changes are design decisions that must reach consensus in this issue
        before any code is written (CONTRIBUTING.md → Issue-first principle).
      options:
        - "No — pure implementation detail (bug fix / wording / internal refactor)"
        - "Yes — touches a channel boundary (needs design consensus here first)"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Including whether a downstream consumer could do this instead of the channel.
    validations:
      required: false
